name: Email AI Agent

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # permite ejecutarlo manualmente desde GitHub

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar processed_ids.json (si existe)
        uses: actions/cache@v4
        with:
          path: processed_ids.json
          key: processed-ids-${{ github.run_id }}
          restore-keys: |
            processed-ids-

      - name: Ejecutar agente
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          COMPANY_NAME: ${{ secrets.COMPANY_NAME }}
        run: python email_agent.py
